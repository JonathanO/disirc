# cargo-mutants configuration
# https://mutants.rs/config.html

exclude_re = [
    # Trivial delegation to config_path_from_iter (which is thoroughly tested)
    "config_path_from_args",
    # Platform-specific; tested via SIGHUP integration test on Unix only
    "unix_signal_loop",
    # split_long_line is only called when line.len() > max_bytes (guard in split_for_irc),
    # so `remaining.len() > max_bytes` vs `>=` is equivalent — the >= case never occurs.
    "replace > with >= in split_long_line",

    # sentinel_to_char: the < vs <= on line 186 is equivalent because input values
    # are always in-range (produced by strip_irc_formatting which only emits valid sentinels).
    "replace < with <= in sentinel_to_char",

    # run_session: deleting `!` in `!queue.is_empty()` causes a busy-loop but
    # produces identical I/O — the loop just sends zero messages instead of skipping.
    "delete ! in run_session",

    # protect_code_spans: the guard `t <= s` filters overlapping spans. Mutating to
    # `true` or `false` changes internal ordering but the function still protects all
    # code spans correctly because overlapping spans are already handled by the
    # outer code-block pass. These are equivalent in practice.
    "replace match guard t <= s with (true|false) in protect_code_spans",

    # NoopIrcResolver / NoopDiscordResolver: test-only shim types whose methods
    # are trivial stubs returning empty/None. Mutating them tests the test harness,
    # not application logic.
    "Noop(Irc|Discord)Resolver",

    # unix_now: non-deterministic clock function — cannot be tested deterministically.
    "unix_now",

    # run_bridge body replacement: requires live IRC+Discord connections.
    "replace run_bridge",

    # create_discord_client body replacement: requires live Discord token.
    "replace create_discord_client",

    # Main entry point — requires full runtime environment.
    "replace main",
]
