name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  lint:
    name: Lint (fmt, deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format
        run: cargo fmt --check

      - uses: EmbarkStudios/cargo-deny-action@v2

  test:
    name: Test (clippy, unit, integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  e2e:
    name: E2E (Layer 3 — real UnrealIRCd)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build UnrealIRCd test image
        uses: docker/build-push-action@v6
        with:
          context: tests/fixtures
          load: true
          tags: disirc-unrealircd-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Layer 3 e2e tests
        run: cargo test --test e2e_irc -- --include-ignored --nocapture

  e2e-discord:
    name: E2E (Layer 4 — real Discord + IRC)
    runs-on: ubuntu-latest
    needs: lint
    environment: discord-e2e
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build UnrealIRCd test image
        uses: docker/build-push-action@v6
        with:
          context: tests/fixtures
          load: true
          tags: disirc-unrealircd-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Layer 4 e2e tests
        env:
          DISCORD_BRIDGE_BOT_TOKEN: ${{ secrets.DISCORD_BRIDGE_BOT_TOKEN }}
          DISCORD_TEST_BOT_TOKEN: ${{ secrets.DISCORD_TEST_BOT_TOKEN }}
          DISCORD_TEST_WEBHOOK_URL: ${{ secrets.DISCORD_TEST_WEBHOOK_URL }}
          DISCORD_TEST_GUILD_ID: ${{ vars.DISCORD_TEST_GUILD_ID }}
          DISCORD_TEST_CHANNEL_ID: ${{ vars.DISCORD_TEST_CHANNEL_ID }}
          DISCORD_TEST_IRC_CHANNEL: ${{ vars.DISCORD_TEST_IRC_CHANNEL }}
          DISCORD_TEST_PLAIN_CHANNEL_ID: ${{ vars.DISCORD_TEST_PLAIN_CHANNEL_ID }}
          DISCORD_TEST_PLAIN_IRC_CHANNEL: ${{ vars.DISCORD_TEST_PLAIN_IRC_CHANNEL }}
        run: cargo test --test e2e_discord -- --include-ignored --nocapture --test-threads=1
