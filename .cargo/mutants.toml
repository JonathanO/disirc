# cargo-mutants configuration
# https://mutants.rs/config.html

exclude_re = [
    # Trivial delegation to config_path_from_iter (which is thoroughly tested)
    "config_path_from_args",
    # Platform-specific; tested via SIGHUP integration test on Unix only
    "unix_signal_loop",
]

# Equivalent mutants that cannot change observable behavior
[[examine_re]]
# split_long_line is only called when line.len() > max_bytes (guard in split_for_irc),
# so `remaining.len() > max_bytes` vs `>=` is equivalent — the >= case never occurs.
regex = "replace > with >= in split_long_line"
replace = false

# `(c as u32) < 0x20` vs `<= 0x20`: char 0x20 (space) is not is_control(),
# so the `&&` guard makes < vs <= equivalent.
[[examine_re]]
regex = "replace < with <= in irc_to_discord_formatting"
replace = false

# `replace && with ||` in irc_to_discord_formatting: same reason — is_control()
# already excludes non-control chars, making the combined predicate equivalent.
[[examine_re]]
regex = "replace && with \\|\\| in irc_to_discord_formatting"
replace = false
