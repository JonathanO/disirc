# cargo-mutants configuration
# https://mutants.rs/config.html
#
# Whole-function exclusions use #[mutants::skip] on the function itself
# (with a comment explaining why). This file is for specific mutation
# patterns within otherwise-testable functions.

exclude_re = [
    # run_session: deleting `!` in `!queue.is_empty()` causes a busy-loop but
    # produces identical I/O — the loop just sends zero messages instead of skipping.
    # Performance-only concern; token bucket still gates actual writes.
    "delete ! in run_session",

    # run_session + to - in timer reset: sets the timer in the past, causing
    # immediate re-fires. Creates a busy-loop but token bucket still gates
    # actual writes, so I/O behaviour is identical. Performance-only concern.
    "replace \\+ with - in run_session",
]
