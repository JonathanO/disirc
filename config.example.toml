# disirc example configuration
#
# Copy this file to config.toml and fill in your real values.
# NEVER commit config.toml — it contains secrets.

[discord]
token = "Bot YOUR_DISCORD_BOT_TOKEN_HERE"

[irc]
uplink = "irc.example.net"
port = 6900            # default: 6900
tls = true             # default: true
link_name = "disirc.example.net"
link_password = "CHANGE_ME"
sid = "0D0"            # must match [0-9][A-Z0-9]{2}
# description = "disirc bridge"  # optional, has a default

[pseudoclients]
# host_suffix = "discord"   # optional, default: "discord"
# ident = "discord"         # optional, default: "discord"

[[bridge]]
discord_channel_id = "123456789012345678"
irc_channel = "#general"
# webhook_url = "https://discord.com/api/webhooks/..."  # optional, enables webhook send path

# [[bridge]]
# discord_channel_id = "987654321098765432"
# irc_channel = "#dev"
