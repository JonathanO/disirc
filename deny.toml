# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Deny any crate with a known security vulnerability
ignore = [
    # rustls-webpki 0.102.8 is pinned by serenity's transitive dep tokio-tungstenite 0.21 → rustls 0.22.
    # We cannot upgrade without a serenity release. Limited impact (requires compromised CA).
    { id = "RUSTSEC-2026-0049", reason = "transitive dep pinned by serenity; awaiting upstream update" },
    # rustls-webpki 0.102.8 name constraint vulnerabilities — same serenity dep chain as above.
    # Fix (>=0.103.12) requires a major version bump; 0.102.x is EOL.
    # Both require certificate misissuance + compromised CA to exploit.
    { id = "RUSTSEC-2026-0098", reason = "transitive dep pinned by serenity; 0.102.x is EOL, awaiting upstream update" },
    { id = "RUSTSEC-2026-0099", reason = "transitive dep pinned by serenity; 0.102.x is EOL, awaiting upstream update" },
    # rustls-pemfile is a dev-only transitive dep (testcontainers → bollard → rustls-pemfile).
    # Advisory is "unmaintained" only — no CVE. Users are encouraged to migrate to rustls-pki-types;
    # we cannot do so until testcontainers or bollard upgrades their dependency.
    { id = "RUSTSEC-2025-0134", reason = "dev-only transitive dep via testcontainers; unmaintained but no CVE" },
    # tokio-tar PAX header smuggling — dev-only transitive dep (testcontainers → bollard → tokio-tar).
    # Only reachable when pulling Docker images in e2e tests; tarballs originate from our local Docker
    # daemon, not untrusted input. No fix available upstream (tokio-tar v0.3.1 is the latest).
    { id = "RUSTSEC-2025-0111", reason = "dev-only transitive dep via testcontainers; only processes Docker-daemon tarballs in e2e tests" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# ring has a non-standard licence file structure
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
