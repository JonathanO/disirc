name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  lint:
    name: Lint (fmt, deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format
        run: cargo fmt --check

      - uses: EmbarkStudios/cargo-deny-action@v2

  test:
    name: Test (clippy, unit, integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  e2e:
    name: E2E (Layer 3 — real UnrealIRCd)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run Layer 3 e2e tests
        run: |
          set -o pipefail
          cargo test --test e2e_irc -- --include-ignored --nocapture 2>&1 \
            | grep -v 'hyper_util\|h2::\|serenity::gateway::bridge'

  e2e-discord:
    name: E2E (Layer 4 — real Discord + IRC)
    runs-on: ubuntu-latest
    needs: lint
    environment: discord-e2e
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run Layer 4 e2e tests
        env:
          DISCORD_BRIDGE_BOT_TOKEN: ${{ secrets.DISCORD_BRIDGE_BOT_TOKEN }}
          DISCORD_TEST_BOT_TOKEN: ${{ secrets.DISCORD_TEST_BOT_TOKEN }}
          DISCORD_TEST_WEBHOOK_URL: ${{ secrets.DISCORD_TEST_WEBHOOK_URL }}
          DISCORD_TEST_GUILD_ID: ${{ vars.DISCORD_TEST_GUILD_ID }}
          DISCORD_TEST_CHANNEL_ID: ${{ vars.DISCORD_TEST_CHANNEL_ID }}
          DISCORD_TEST_IRC_CHANNEL: ${{ vars.DISCORD_TEST_IRC_CHANNEL }}
          DISCORD_TEST_PLAIN_CHANNEL_ID: ${{ vars.DISCORD_TEST_PLAIN_CHANNEL_ID }}
          DISCORD_TEST_PLAIN_IRC_CHANNEL: ${{ vars.DISCORD_TEST_PLAIN_IRC_CHANNEL }}
        run: |
          set -o pipefail
          cargo test --test e2e_discord -- --include-ignored --nocapture --test-threads=1 2>&1 \
            | grep -v 'hyper_util\|h2::\|serenity::gateway::bridge'
