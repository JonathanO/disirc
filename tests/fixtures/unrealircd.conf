/* Load required modules */
include "modules.default.conf";
include "operclass.default.conf";
include "snomasks.default.conf";

loadmodule "cloak_sha256";

/* Server identity */
me {
    name irc.test.net;
    info "Integration test IRC server";
    sid 001;
};

admin {
    "Test server";
    "Not for production";
};

/* Connection classes */
class clients {
    pingfreq 90;
    maxclients 1000;
    sendq 100000;
};

class servers {
    pingfreq 60;
    connfreq 15;
    maxclients 10;
    sendq 5M;
};

/* Allow all client connections (tests connect from localhost) */
allow {
    mask *@*;
    class clients;
    maxperip 100;
};

/* Plain TCP for IRC clients (test verification) */
listen {
    ip *;
    port 6667;
};

/* TLS listener — required by UnrealIRCd 6.x even for test servers */
listen {
    ip *;
    port 6697;
    options { tls; };
};

/* Plain TCP for S2S links */
listen {
    ip *;
    port 6900;
    options { serversonly; };
};

/* S2S link block for the bridge */
link bridge.test.net {
    incoming {
        mask *;
    };
    password "testpassword";
    class servers;
    hub *;
};

/* Oper account for test convenience */
oper test {
    class clients;
    mask *@*;
    password "test";
    operclass netadmin-with-override;
};

/* Network settings (set::network-name and set::kline-address are mandatory) */
set {
    network-name "TestNet";
    default-server "irc.test.net";
    help-channel "#help";
    hiddenhost-prefix "Clk";
    kline-address "test@example.org";
    cloak-keys {
        "ZW2DqyLM7h85SfPG9veoNxRcwbtFXnf7eDcjR3Omer3DMxq0mvlMIU4HkvyYXqx4NhVrLnDUdtl7SwdIJzwjk1YS";
        "DB9SVpnUQpa1hVLHFHI29pjeV4oGcsbaJe4RpQeURk4S5kJeQILqPu8ClvmIgPWyZyJE8GVANxNtbxNbRgAnItUK";
        "wXfFYUGmaE495FCSmznXAkURWVEHdRiWnqifaUVFbdP35RcQWJasFSV36x9XzPVt0HA4mPuUZyQXtvFhzvXGufPq";
    };
    modes-on-connect "+ixw";
    modes-on-join "+";
    maxchannelsperuser 25;
    handshake-delay 0;
    ping-cookie no;
    max-unknown-connections-per-ip 99;

    /* Allow plaintext S2S links — this is a test-only server. */
    plaintext-policy {
        server allow;
        oper allow;
        user allow;
    };

    /* Disable anti-flood for testing */
    anti-flood {
        everyone {
            connect-flood 250:1;
        }
        known-users {
            join-flood 250:10;
        }
        unknown-users {
            join-flood 250:10;
        }
        channel {
            boot-delay 0;
            split-delay 0;
        }
    };
};

/* Disable connthrottle (interferes with rapid test connections) */
blacklist-module "connthrottle";

log {
    source { all; }
    destination {
        file "ircd.log" { maxsize 10M; }
    }
};
